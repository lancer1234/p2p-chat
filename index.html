<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P 去中心交友工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="https://unpkg.com/nostr-tools@1.17.0/lib/nostr.bundle.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        button { background: #00ffcc; color: #000; border: none; padding: 10px 20px; margin: 10px; cursor: pointer; font-weight: bold; }
        #reader { width: 300px; margin: 0 auto; background: #222; }
    </style>
</head>
<body>
    <h1>📟 P2P Nostr Chat</h1>
    <p>當面掃QR，絕對隱私</p>
    
    <button id="btn-create">1. 產生我的邀請 QR Code</button>
    <button id="btn-scan">2. 掃描對方的 QR Code</button>
    
    <div id="qrcode-container"></div>
    <div id="reader" style="display:none;"></div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
