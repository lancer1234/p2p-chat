<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; script-src 'self' https://cdnjs.cloudflare.com unpkg.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss://nos.lol wss://relay.damus.io wss://relay.primal.net wss://relay.nostr.band; img-src 'self' data:;">
    <title>📟 P2P Chat StateMachine Engine v1.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="https://unpkg.com/nostr-tools@1.17.0/lib/nostr.bundle.js"></script>
    
    <style>
        :root {
            --bg: #0A0A0C;
            --panel: #121215;
            --border: #222227;
            --text: #E4E4E7;
            --text-muted: #52525B;
            --accent: #00FFCC;
            --danger: #EF4444;
            --warning: #F59E0B;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 0; 
            display: flex; flex-direction: column; min-height: 100dvh; 
            align-items: center; justify-content: center; overflow: hidden; 
        }
        
        #pin-container { width: 100%; max-width: 360px; padding: 24px; text-align: center; z-index: 200; }
        .pin-wrapper { position: relative; width: 100%; margin: 20px 0 10px 0; }
        .pin-input {
            width: 100%; background: var(--panel); border: 1px solid var(--border);
            padding: 16px; color: #FFF; font-size: 1.1rem; text-align: center;
            border-radius: 8px;
        }
        .show-pin-label { display: flex; align-items: center; justify-content: flex-end; gap: 6px; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; margin-bottom: 20px; }
        
        .divider { border-top: 1px solid var(--border); margin: 24px 0; position: relative; }
        .divider-text { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg); padding: 0 10px; font-size: 0.75rem; color: var(--text-muted); }

        #setup-container { display: none; width: 100%; max-width: 360px; padding: 24px; text-align: center; z-index: 5; }
        h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.025em; margin: 0 0 8px 0; color: #FFF; }
        .subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; }
        
        /* Relay 矩陣看板樣式 */
        .relay-board { background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 24px; text-align: left; font-family: monospace; font-size: 0.75rem; }
        .relay-title { font-weight: bold; color: var(--text); margin-bottom: 6px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .relay-item { display: flex; align-items: center; justify-content: space-between; line-height: 1.6; color: var(--text-muted); }
        .relay-status { font-weight: bold; }
        .relay-status.ok { color: var(--accent); }
        .relay-status.fail { color: var(--danger); }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button { 
            background: var(--panel); color: var(--text); border: 1px solid var(--border); 
            padding: 16px; border-radius: 8px; font-size: 0.95rem; font-weight: 500; 
            cursor: pointer; width: 100%; transition: background 0.1s;
        }
        button:active { background: var(--border); }
        #btn-create { border-color: rgba(0, 255, 204, 0.4); color: var(--accent); }
        #btn-resume { display: none; border-color: rgba(0, 255, 204, 0.2); color: #00CCAA; font-weight: 600; }
        .btn-danger-link { background: transparent; border: none; color: var(--text-muted); font-size: 0.8rem; cursor: pointer; text-decoration: underline; margin-top: 8px; padding: 8px; }
        .btn-danger-link:hover { color: var(--danger); }
        
        #reader { width: 100%; max-width: 320px; margin: 20px auto; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: none; }
        #qrcode-container { margin: 20px auto; width: 85vw; max-width: 340px; background: #FFF; padding: 24px; border-radius: 16px; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.6); text-align: center; }
        #qrcode-container h3 { color: #0A0A0C; font-size: 0.85rem; font-weight: 600; margin: 0 0 16px 0; }
        #qrcode-container img { width: 100% !important; height: auto !important; display: block; image-rendering: pixelated; }

        #debug-console {
            width: 100%; max-width: 360px; height: 120px; background: #000; border: 1px solid #333;
            border-radius: 6px; font-family: monospace; font-size: 11px; color: #888;
            padding: 8px; overflow-y: auto; text-align: left; margin-top: 20px; white-space: pre-wrap;
        }

        #chat-interface { 
            display: none; width: 100%; max-width: 600px; height: 100dvh; background: var(--bg); 
            flex-direction: column; position: fixed; top: 0; left: 50%; transform: translateX(-50%); z-index: 100; 
        }
        
        #chat-header { height: 56px; border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: var(--bg); }
        .status-container { display: flex; align-items: center; gap: 8px; }
        #status-text { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; }
        #status-dot { width: 6px; height: 6px; border-radius: 50%; transition: all 0.3s; }
        
        #btn-leave { font-size: 0.8rem; color: var(--text-muted); cursor: pointer; background: transparent; border: none; width: auto; padding: 4px 8px; }
        
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: var(--bg); }
        .msg { max-width: 75%; padding: 10px 14px; font-size: 0.92rem; line-height: 1.45; word-break: break-all; }
        .msg.system { background: transparent; color: var(--text-muted); align-self: center; text-align: center; font-size: 0.75rem; max-width: 90%; }
        .msg.me { background: var(--panel); color: #FFF; align-self: flex-end; border-radius: 14px 14px 2px 14px; border: 1px solid var(--border); }
        .msg.friend { background: transparent; color: var(--text); align-self: flex-start; border-radius: 14px 14px 14px 2px; border: 1px solid var(--border); }
        
        #chat-input-area { padding: 12px 16px calc(12px + env(safe-area-inset-bottom)) 16px; border-top: 1px solid var(--border); display: flex; align-items: center; background: var(--bg); gap: 12px; }
        #input-msg { flex: 1; background: var(--panel); border: 1px solid var(--border); padding: 12px 16px; color: #FFF; font-size: 0.95rem; border-radius: 20px; }
        #input-msg:focus { outline: none; border-color: rgba(0, 255, 204, 0.4); }
        #btn-send { background: transparent; color: var(--accent); border: none; padding: 8px 12px; font-weight: 600; font-size: 0.9rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="pin-container">
        <h1>🔐 身分驗證安全鎖</h1>
        <div class="subtitle" id="pin-tip">請輸入或設定至少 8 位安全密碼</div>
        <div class="pin-wrapper">
            <input type="password" id="input-pin" class="pin-input" placeholder="輸入解鎖密碼">
        </div>
        <label class="show-pin-label">
            <input type="checkbox" id="checkbox-show-pin"> 顯示密碼
        </label>
        <button id="btn-unlock">確認解鎖 / 初始化身份</button>
        
        <div class="divider">
            <span class="divider-text">忘記 PIN 碼？</span>
        </div>
        <button id="btn-reset-identity" class="btn-danger-link">物理重置身分與聊天紀錄</button>
    </div>

    <div id="setup-container">
        <h1>📟 P2P Chat</h1>
        <div class="subtitle">去中心化・本地端對端加密通訊</div>
        
        <!-- 💡 新增的動態信令狀態面板 -->
        <div class="relay-board">
            <div class="relay-title">📡 信令中繼站矩陣 (Relay Matrix)</div>
            <div class="relay-item"><span>nos.lol</span><span id="relay-0" class="relay-status fail">🔴 OFF</span></div>
            <div class="relay-item"><span>relay.damus.io</span><span id="relay-1" class="relay-status fail">🔴 OFF</span></div>
            <div class="relay-item"><span>relay.primal.net</span><span id="relay-2" class="relay-status fail">🔴 OFF</span></div>
            <div class="relay-item"><span>relay.nostr.band</span><span id="relay-3" class="relay-status fail">🔴 OFF</span></div>
        </div>

        <div class="btn-group">
            <button id="btn-resume">恢復上一次的加密對話</button>
            <button id="btn-create">1. 產生邀請 QR Code</button>
            <button id="btn-scan">2. 掃描對方 QR Code</button>
        </div>
        <div id="debug-console">系統初始化中...</div>
    </div>
    
    <div id="qrcode-container"></div>
    <div id="reader"></div>

    <div id="chat-interface">
        <div id="chat-header">
            <div class="status-container">
                <div id="status-dot"></div>
                <span id="status-text">IDLE</span>
            </div>
            <button id="btn-leave">[ 離開對話 ]</button>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="input-msg" placeholder="輸入訊息..." autocomplete="off">
            <button id="btn-send">發送</button>
        </div>
    </div>

    <!-- 🟢 注入動態快取防鎖：Cache Busting 戳記 -->
    <script type="module">
        const versionStamp = "20260713-v1.0.1";
        import(`./js/app.js?v=${versionStamp}`).catch(console.error);
    </script>
</body>
</html>
