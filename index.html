<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📟 P2P Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="https://unpkg.com/nostr-tools@1.17.0/lib/nostr.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    
    <style>
        :root {
            --bg: #0A0A0C;
            --panel: #121215;
            --border: #222227;
            --text: #E4E4E7;
            --text-muted: #52525B;
            --accent: #00FFCC;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; }
        
        /* 歡迎與設定區塊 */
        #setup-container { width: 100%; max-width: 360px; padding: 40px 24px; text-align: center; }
        h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.025em; margin: 0 0 8px 0; color: #FFF; }
        .subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 36px; }
        
        /* 極簡按鈕 */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button { background: var(--panel); color: var(--text); border: 1px solid var(--border); padding: 14px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); width: 100%; }
        button:active { background: var(--border); transform: scale(0.98); }
        #btn-create { border-color: rgba(0, 255, 204, 0.3); color: var(--accent); }
        
        /* 相機與 QR 容器優化（嚴格限制在手機螢幕內） */
        #reader { width: 100%; max-width: 320px; margin: 20px auto; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: none; }
        #qrcode-container { margin: 24px auto; max-width: 260px; width: 100%; background: #FFF; padding: 16px; border-radius: 12px; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; }
        #qrcode-container h3 { color: #0A0A0C; font-size: 0.8rem; font-weight: 600; margin: 0 0 12px 0; }
        #qrcode-container img { width: 100% !important; height: auto !important; display: block; }

        /* 滿版極簡聊天室架構 */
        #chat-interface { display: none; width: 100%; max-width: 600px; height: 100vh; background: var(--bg); flex-direction: column; position: fixed; top: 0; left: 50%; transform: translateX(-50%); }
        #chat-header { height: 56px; border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(12px); z-index: 10; }
        #chat-header span { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em; color: #FFF; }
        #status-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); transition: background 0.3s; }
        
        /* 訊息滾動區 */
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: var(--bg); scroll-behavior: smooth; }
        .msg { max-width: 75%; padding: 10px 14px; font-size: 0.92rem; line-height: 1.45; word-break: break-all; }
        .msg.system { background: transparent; color: var(--text-muted); align-self: center; text-align: center; font-size: 0.75rem; border: none; max-width: 90%; letter-spacing: 0.02em; }
        .msg.me { background: var(--panel); color: #FFF; align-self: flex-end; border-radius: 14px 14px 2px 14px; border: 1px solid var(--border); }
        .msg.friend { background: transparent; color: var(--text); align-self: flex-start; border-radius: 14px 14px 14px 2px; border: 1px solid var(--border); }
        
        /* 輸入法控制區（牢牢黏在手機底部） */
        #chat-input-area { padding: 12px 16px padding-bottom: calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; align-items: center; background: var(--bg); gap: 12px; }
        #input-msg { flex: 1; background: var(--panel); border: 1px solid var(--border); padding: 12px 16px; color: #FFF; font-size: 0.95rem; border-radius: 20px; transition: border 0.2s; }
        #input-msg:focus { outline: none; border-color: rgba(0, 255, 204, 0.4); }
        #btn-send { background: transparent; color: var(--accent); border: none; padding: 8px 12px; font-weight: 600; font-size: 0.9rem; cursor: pointer; width: auto; }
        #btn-send:active { opacity: 0.6; }
    </style>
</head>
<body>

    <div id="setup-container">
        <h1>📟 P2P Chat</h1>
        <div class="subtitle">去中心化・本地端對端加密加密通訊</div>
        
        <div class="btn-group">
            <button id="btn-create">1. 產生邀請 QR Code</button>
            <button id="btn-scan">2. 掃描對方 QR Code</button>
        </div>
    </div>
    
    <div id="qrcode-container"></div>
    <div id="reader"></div>

    <div id="chat-interface">
        <div id="chat-header">
            <span>DIRECT CHANNEL</span>
            <div id="status-dot"></div>
        </div>
        <div id="chat-messages">
            <div class="msg system">等待 P2P 通道建立...</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="input-msg" placeholder="輸入訊息..." autocomplete="off">
            <button id="btn-send">發送</button>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
